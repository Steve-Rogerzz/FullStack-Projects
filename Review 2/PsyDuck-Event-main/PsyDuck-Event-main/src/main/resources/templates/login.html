<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - PsyDuck Events</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    "colors": {
                        "primary": "#000000",
                        "background": "#fbf9f9",
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #fbf9f9; font-family: 'Public Sans', sans-serif; }
    </style>
</head>
<body class="text-zinc-900 min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <img th:src="@{/images/logo.png}" class="w-20 h-20 mx-auto mb-6 rounded-3xl shadow-2xl border border-white" alt="Logo"/>
            <h1 class="text-3xl font-black tracking-tighter text-zinc-900 mb-2">PsyDuck Events</h1>
            <p class="text-zinc-400 font-bold uppercase text-[10px] tracking-[0.2em]">Institutional Access</p>
        </div>

        <div class="bg-white p-10 rounded-[2.5rem] border border-zinc-200 shadow-2xl">
            <div th:if="${param.error}" class="mb-6 p-4 bg-red-50 text-red-600 rounded-2xl text-xs font-bold text-center border border-red-100">
                Invalid credentials. Please try again.
            </div>
            <div th:if="${param.logout}" class="mb-6 p-4 bg-zinc-50 text-zinc-600 rounded-2xl text-xs font-bold text-center border border-zinc-100">
                You have been logged out.
            </div>

            <form th:action="@{/login}" method="post" class="flex flex-col gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest ml-2">Username</label>
                    <input name="username" class="w-full p-4 bg-zinc-50 border border-zinc-100 rounded-2xl focus:border-black focus:ring-0 outline-none transition-all font-bold" placeholder="your_id" type="text" required/>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest ml-2">Password</label>
                    <input name="password" class="w-full p-4 bg-zinc-50 border border-zinc-100 rounded-2xl focus:border-black focus:ring-0 outline-none transition-all font-bold" placeholder="••••••••" type="password" required/>
                </div>
                <button type="submit" class="w-full bg-zinc-900 text-white font-black py-5 rounded-2xl hover:bg-black transition-all shadow-xl mt-4">Sign In</button>
            </form>
            
            <div class="mt-8 pt-8 border-t border-zinc-50 flex flex-col gap-4 text-center">
                <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Demo Credentials</p>
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-3 bg-zinc-50 rounded-xl border border-zinc-100 text-[10px]">
                        <p class="text-zinc-400">ADMIN</p>
                        <p class="font-black">admin / admin123</p>
                    </div>
                    <div class="p-3 bg-zinc-50 rounded-xl border border-zinc-100 text-[10px]">
                        <p class="text-zinc-400">STUDENT</p>
                        <p class="font-black">student / student123</p>
                    </div>
                </div>
            </div>
        </div>

        <p class="mt-10 text-center text-xs text-zinc-400 font-bold uppercase tracking-widest">
            <a href="/" class="hover:text-zinc-900 transition-colors">← Back to Home</a>
        </p>
    </div>
</body>
</html>
