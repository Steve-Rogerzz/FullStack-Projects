<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Get in Touch')}"></head>
<body>

<header th:replace="~{fragments :: navbar}"></header>

<main class="max-w-[1200px] mx-auto px-6 pt-48 pb-32 min-h-screen">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-32">
        <div class="pt-10">
            <span class="text-[10px] font-black tracking-[0.4em] uppercase text-zinc-400 mb-8 inline-block">Support Hub</span>
            <h1 class="text-8xl font-black text-zinc-900 tracking-tighter mb-12 leading-[0.85]">Let's <br/>Talk.</h1>
            <p class="text-xl text-zinc-500 font-medium leading-relaxed mb-20 max-w-md">Our team is here to assist with any technical issues, partnership inquiries, or general campus questions.</p>
            
            <div class="space-y-12">
                <div class="group flex items-start gap-8">
                    <div class="w-16 h-16 bg-white rounded-3xl border border-zinc-100 shadow-soft flex items-center justify-center transition-all group-hover:bg-zinc-900 group-hover:text-white group-hover:shadow-2xl">
                        <span class="material-symbols-outlined text-2xl">mail</span>
                    </div>
                    <div>
                        <p class="text-[10px] font-black uppercase tracking-widest text-zinc-400 mb-2">Email Address</p>
                        <p class="text-2xl font-black text-zinc-900 tracking-tight">hello@psyduck.edu</p>
                    </div>
                </div>
                
                <div class="group flex items-start gap-8">
                    <div class="w-16 h-16 bg-white rounded-3xl border border-zinc-100 shadow-soft flex items-center justify-center transition-all group-hover:bg-zinc-900 group-hover:text-white group-hover:shadow-2xl">
                        <span class="material-symbols-outlined text-2xl">location_on</span>
                    </div>
                    <div>
                        <p class="text-[10px] font-black uppercase tracking-widest text-zinc-400 mb-2">Campus Location</p>
                        <p class="text-2xl font-black text-zinc-900 tracking-tight">Admin Block, Wing 4<br/>Suite 201</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-16 rounded-[60px] shadow-2xl border border-zinc-50">
            <h2 class="text-3xl font-black mb-10 tracking-tight">Send an Inquiry</h2>
            <form class="space-y-8">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 ml-4">Your Name</label>
                        <input class="w-full px-6 py-4 bg-zinc-50 border border-zinc-50 rounded-2xl text-sm font-bold outline-none focus:bg-white focus:border-zinc-900 transition-all" placeholder="John Doe"/>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 ml-4">Your Email</label>
                        <input class="w-full px-6 py-4 bg-zinc-50 border border-zinc-50 rounded-2xl text-sm font-bold outline-none focus:bg-white focus:border-zinc-900 transition-all" placeholder="john@example.com"/>
                    </div>
                </div>
                
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 ml-4">Subject</label>
                    <select class="w-full px-6 py-4 bg-zinc-50 border border-zinc-50 rounded-2xl text-sm font-bold outline-none focus:bg-white focus:border-zinc-900 transition-all appearance-none">
                        <option>General Support</option>
                        <option>Partnership Inquiry</option>
                        <option>Report an Issue</option>
                    </select>
                </div>
                
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 ml-4">Message</label>
                    <textarea class="w-full px-6 py-4 bg-zinc-50 border border-zinc-50 rounded-2xl text-sm font-bold outline-none focus:bg-white focus:border-zinc-900 transition-all min-h-[160px]" placeholder="How can we help you?"></textarea>
                </div>
                
                <button class="w-full py-5 bg-zinc-900 text-white font-black rounded-2xl hover:bg-black transition-all shadow-xl hover:scale-[1.02]">Shoot Message</button>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
